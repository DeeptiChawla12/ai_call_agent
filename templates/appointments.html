<!DOCTYPE html>
<html>
<head>
    <title>Appointments</title>
</head>
<body>

<h2>Appointments</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Date</th>
        <th>Time</th>
    </tr>

    {% for item in appointments %}
    <tr>
        <td>{{ item[0] }}</td>
        <td>{{ item[1] }}</td>
        <td>{{ item[2] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
